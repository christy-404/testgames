<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Guess | Emmanuel's Celebration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/games.css">
</head>
<body>
  <div class="bg-mesh">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <nav class="top-nav">
    <a href="../index.html" class="logo">Emmanuel</a>
    <a href="../index.html" class="back-btn" data-navigate>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Back to Home
    </a>
  </nav>

  <section class="game-section">
    <div class="container">
      <div class="game-header text-center animate-fade-in-up">
        <div class="label">Nostalgic Journey</div>
        <h2>Photo Guess Game</h2>
        <hr class="divider">
        <p>Can you guess the story behind each photo? Take a trip down memory lane.</p>
      </div>

      <div class="photo-game-container animate-scale-in delay-2">
        <div class="photo-card" id="photoCard">
          <div class="photo-display" id="photoDisplay">
            <img id="photoImage" src="" alt="Emmanuel's photo" style="display:none;">
            <div class="photo-placeholder" id="photoPlaceholder">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
              <p>Add photos to the assets folder to see them here</p>
            </div>
            <!-- Answer Overlay -->
            <div class="photo-overlay" id="answerOverlay">
              <div class="answer-reveal" id="answerReveal">The Answer</div>
              <p class="answer-story" id="answerStory">Story goes here.</p>
            </div>
          </div>

          <div class="photo-question">
            <h3 id="photoQuestion">What is happening in this photo?</h3>
            <div class="guess-input-group">
              <input type="text" class="form-input" id="guessInput" placeholder="Type your guess here...">
              <button class="btn btn-primary" id="guessBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Guess
              </button>
            </div>
            <button class="btn btn-secondary" id="revealBtn" style="width:100%;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              Reveal Answer
            </button>
          </div>

          <div class="photo-nav">
            <button class="nav-arrow" id="prevBtn" aria-label="Previous photo">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <span class="photo-counter" id="photoCounter">1 / 5</span>
            <button class="nav-arrow" id="nextBtn" aria-label="Next photo">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div class="page-transition" id="pageTransition"></div>

  <script src="../js/main.js"></script>
  <script src="../js/photo-guess.js"></script>
</body>
</html>
