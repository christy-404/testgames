<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reaction Time Leaderboard | Emmanuel's Celebration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/games.css">
</head>
<body>
  <div class="bg-mesh">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <nav class="top-nav">
    <a href="../index.html" class="logo">Emmanuel</a>
    <a href="../index.html" class="back-btn" data-navigate>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Back to Home
    </a>
  </nav>

  <section class="game-section">
    <div class="container">
      <div class="game-header text-center animate-fade-in-up">
        <div class="label">Official Standings</div>
        <h2>Reaction Time Leaderboard</h2>
        <hr class="divider">
        <p>Complete rankings of everyone who took the challenge.</p>
      </div>

      <!-- Leaderboard Stats -->
      <div class="leaderboard-stats glass-card animate-fade-in-up delay-2" id="leaderboardStats">
        <div class="stat-item">
          <span class="stat-value" id="entryCount">0</span>
          <span class="stat-label">Players</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-value" id="fastestTime">--</span>
          <span class="stat-label">Fastest Time</span>
        </div>
      </div>

      <!-- Empty State -->
      <div class="leaderboard-empty-state glass-card animate-scale-in" id="leaderboardEmpty" style="display:none;">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
        </div>
        <h3 class="empty-title">No Entries Yet</h3>
        <p class="empty-message">Be the first to take the challenge and claim the top spot.</p>
        <a href="reaction-time.html" class="btn btn-primary btn-lg" data-navigate>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          Take the Challenge
        </a>
      </div>

      <!-- Full Leaderboard List -->
      <div class="full-leaderboard-container glass-card animate-fade-in-up delay-2" id="fullLeaderboard">
        <div class="full-leaderboard-header">
          <span class="lb-header-rank">Rank</span>
          <span class="lb-header-name">Player</span>
          <span class="lb-header-score">Time</span>
        </div>
        <div class="full-leaderboard-list" id="fullLeaderboardList"></div>
      </div>

      <!-- Leaderboard Actions -->
      <div class="leaderboard-actions">
        <a href="reaction-time.html" class="btn btn-secondary" data-navigate>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          Take the Challenge
        </a>
      </div>

    </div>
  </section>

  <div class="page-transition" id="pageTransition"></div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/reaction-leaderboard.js"></script>
</body>
</html>
